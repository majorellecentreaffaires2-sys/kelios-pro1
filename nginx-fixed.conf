events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml+rss;

    # Cache statique
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    max;
    }

    server {
        listen 80;
        server_name 194.164.77.52;
        root /usr/share/nginx/html;
        index index.html;

        # Cache statique
        expires $expires;

        # Sécurité
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Gestion des requêtes OPTIONS (CORS preflight)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Routes API avec réponses simulées
        location /api/login {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"Connexion réussie (mode démo)","token":"demo-token-12345","user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User","subscriptionStatus":"active","plan":"monthly_200"}}';
        }

        location /api/register {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"Compte créé avec succès (mode démo)","needsVerification":false,"verificationCode":"123456","token":"demo-token-12345","user":{"id":"demo-user","username":"newuser","email":"newuser@kelios.ma","role":"User"}}';
        }

        location /api/verify-email {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"Email vérifié avec succès (mode démo)","token":"demo-token-12345","user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User"}}';
        }

        location /api/me {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User","subscriptionStatus":"active","plan":"monthly_200","createdAt":"2026-04-10T12:00:00Z"}}';
        }

        location /api/test {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"API KELIOS IA opérationnelle (mode démo)","timestamp":"2026-04-10T12:00:00Z"}';
        }

        location /api/test-db {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"Connexion DB simulée","userCount":11}';
        }

        # Autres routes API avec réponses génériques
        location /api/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json' always;
            return 200 '{"success":true,"message":"API KELIOS IA (mode démo)","data":[]}';
        }

        # Route principale pour le frontend React
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache busting pour les assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
