name: Deploy to CPanel Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}
        
    - name: Deploy to CPanel
      run: |
        # Nettoyer l'ancienne version
        ssh -o StrictHostKeyChecking=no ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} << 'EOF'
          cd public_html
          rm -rf kelios-app
          mkdir -p kelios-app
          exit
        EOF
        
        # Copier les fichiers build vers CPanel
        scp -o StrictHostKeyChecking=no -r dist/* ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:public_html/kelios-app/
        
        # Copier .htaccess pour routing React
        scp -o StrictHostKeyChecking=no .htaccess ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:public_html/kelios-app/
        
        # Fixer les permissions pour CPanel
        ssh -o StrictHostKeyChecking=no ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} << 'EOF'
          cd public_html/kelios-app
          find . -type d -exec chmod 755 {} \;
          find . -type f -exec chmod 644 {} \;
          chmod 644 .htaccess
          exit
        EOF
