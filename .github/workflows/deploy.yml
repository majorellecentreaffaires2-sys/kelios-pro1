name: Deploy to Hostinger Ubuntu VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Clear npm cache
      run: npm cache clean --force
        
    - name: Install dependencies
      run: |
        npm ci --prefer-offline --no-audit
      continue-on-error: false

    - name: Verify dependencies
      run: npm list --depth=0

    - name: Build application
      run: npm run build

    - name: Verify build output
      run: ls -la dist/

    - name: Setup environment variables
      run: |
        echo "VPS_HOST=${{ secrets.VPS_HOST }}" >> $GITHUB_ENV
        echo "VPS_USER=${{ secrets.VPS_USER }}" >> $GITHUB_ENV
        echo "VPS_PORT=${{ secrets.VPS_PORT }}" >> $GITHUB_ENV
        echo "VPS_SSH_KEY_SET=true" >> $GITHUB_ENV

    - name: Debug environment
      run: |
        echo "=== DEBUG ENVIRONMENT ==="
        echo "VPS_HOST: $VPS_HOST"
        echo "VPS_USER: $VPS_USER"
        echo "VPS_PORT: $VPS_PORT"
        echo "VPS_SSH_KEY_SET: $VPS_SSH_KEY_SET"
        echo "=== END DEBUG ==="
        
        if [ -z "$VPS_HOST" ]; then 
          echo "ERROR: VPS_HOST is empty"
          echo "Please configure VPS_HOST secret in GitHub repository"
          exit 1
        fi
        
        if [ -z "$VPS_USER" ]; then 
          echo "ERROR: VPS_USER is empty"
          echo "Please configure VPS_USER secret in GitHub repository"
          exit 1
        fi
        
        if [ -z "$VPS_PORT" ]; then 
          echo "ERROR: VPS_PORT is empty"
          echo "Please configure VPS_PORT secret in GitHub repository"
          exit 1
        fi
        
        echo "✅ All environment variables are configured correctly"

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

    - name: Deploy to Hostinger Ubuntu VPS
      run: |
        echo "Starting deployment to $VPS_HOST:$VPS_PORT"
        
        # Connect to VPS and setup deployment
        ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << 'EOF'
          # Create deployment directory
          mkdir -p /var/www/facture-app
          cd /var/www/facture-app
          
          # Stop existing containers
          docker-compose down --remove-orphans 2>/dev/null || true
          
          # Remove old files
          rm -rf *
          
          exit
        EOF

        # Copy files to VPS
        echo "Uploading files to VPS..."
        scp -o StrictHostKeyChecking=no -P $VPS_PORT -r dist/* $VPS_USER@$VPS_HOST:/var/www/facture-app/
        scp -o StrictHostKeyChecking=no -P $VPS_PORT docker-compose.yml $VPS_USER@$VPS_HOST:/var/www/facture-app/
        scp -o StrictHostKeyChecking=no -P $VPS_PORT Dockerfile $VPS_USER@$VPS_HOST:/var/www/facture-app/

        # Deploy with Docker
        ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << 'EOF'
          cd /var/www/facture-app
          
          # Build and start containers
          docker-compose build --no-cache
          docker-compose up -d
          
          # Wait for containers to start
          sleep 10
          
          # Check if containers are running
          if docker-compose ps | grep -q "Up"; then
            echo "✅ Containers started successfully"
          else
            echo "❌ Error starting containers"
            docker-compose logs
            exit 1
          fi
          
          # Clean up unused images
          docker image prune -f
          
          exit
        EOF

    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        sleep 15
        
        # Test if application is accessible
        if curl -f -s "http://$VPS_HOST" > /dev/null; then
          echo "✅ Application is accessible at http://$VPS_HOST"
        else
          echo "❌ Application is not accessible"
          echo "Checking container status..."
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST << 'EOF'
            cd /var/www/facture-app
            docker-compose ps
            docker-compose logs
            exit
          EOF
          exit 1
        fi
      env:
        VPS_HOST: ${{ secrets.VPS_HOST }}
        VPS_USER: ${{ secrets.VPS_USER }}
        VPS_PORT: ${{ secrets.VPS_PORT }}
