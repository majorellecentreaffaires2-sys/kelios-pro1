version: '3.8'

services:
  # Backend Node.js avec SQLite
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kelios-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/kelios.db
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React avec Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kelios-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./nginx-logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  nginx-logs:
    driver: local
  data:
    driver: local
