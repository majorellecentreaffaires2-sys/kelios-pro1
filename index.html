<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kelios Pro" />
  <title> Kelios Pro - Gestion de facturation</title>
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <link rel="apple-touch-icon" href="/logo.jpeg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet" />
  <style>
    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
      min-height: 100vh;
      color: #1a2b3c;
      overflow-x: hidden;
    }

    .font-serif-premium {
      font-family: "Playfair Display", serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    .hover-lift {
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 122, 255, 0.15);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f0f7ff;
    }

    ::-webkit-scrollbar-thumb {
      background: #cce4ff;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #007aff;
    }
  </style>

  <script type="module" src="/src/main.tsx"></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
