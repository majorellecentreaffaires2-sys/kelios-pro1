events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    server {
        listen 80;
        server_name 194.164.77.52;
        root /usr/share/nginx/html;
        index index.html;

        # Routes API avec réponses simulées
        location /api/login {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"message":"Connexion réussie (mode démo)","token":"demo-token-12345","user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User","subscriptionStatus":"active","plan":"monthly_200"}}';
        }

        location /api/register {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"message":"Compte créé avec succès (mode démo)","needsVerification":false,"verificationCode":"123456","token":"demo-token-12345","user":{"id":"demo-user","username":"newuser","email":"newuser@kelios.ma","role":"User"}}';
        }

        location /api/verify-email {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"message":"Email vérifié avec succès (mode démo)","token":"demo-token-12345","user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User"}}';
        }

        location /api/me {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"user":{"id":"demo-user","username":"demo@kelios.ma","email":"demo@kelios.ma","role":"User","subscriptionStatus":"active","plan":"monthly_200","createdAt":"2026-04-10T12:00:00Z"}}';
        }

        location /api/test {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"message":"API KELIOS IA opérationnelle (mode démo)","timestamp":"2026-04-10T12:00:00Z"}';
        }

        location /api/ {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json';
            return 200 '{"success":true,"message":"API KELIOS IA (mode démo)","data":[]}';
        }

        # Route principale pour le frontend React
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
