server {
    listen 80;
    server_name logiciel-gfd.com www.logiciel-gfd.com 194.164.77.54 localhost;
    root /var/www/kelios-pro1/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Routing React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache statique
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité - bloquer accès aux fichiers cachés
    location ~ /\. {
        deny all;
    }

    # Logs d'accès
    access_log /var/log/nginx/kelios_access.log;
    error_log /var/log/nginx/kelios_error.log;
}